name: Docs
on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.8.8
        with:
          environments: docs

      - uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: "2.2.x"

      - name: Install cligen
        run: nimble install cligen -y

      - name: Build Sphinx docs
        run: pixi run -e docs sphinxbld

      - name: Build Nim API docs
        run: pixi run nimdoc

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
